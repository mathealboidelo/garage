<div class="container mt-5" *ngIf="user">
  <div class="d-flex justify-content-between align-items-center mb-4">
      <h1>🏎️ Tableau de Bord</h1>
      <button (click)="logout()" class="btn btn-danger">Changer de profil</button>
  </div>

  <div class="card bg-dark text-white">
    <div class="card-body">
      <h2>Pilote : {{ user.username }}</h2>
      <div class="row mt-3">
          <div class="col-md-6">
              <h3>Argent</h3>
              <p class="display-4 text-warning">{{ user.credits | number }} CR</p>
          </div>
          <div class="col-md-6">
              <h3>Niveau</h3>
              <p class="display-4">{{ user.level }}</p>
          </div>
      </div>
    </div>
  </div>
</div>

<div class="container mt-4" *ngIf="dealerships.length > 0">
    <h2 class="mb-3">🏭 Concessionnaires disponibles</h2>
    
    <div class="row">
        <div class="col-md-4 mb-3" *ngFor="let dealer of dealerships">
            <div class="card border-info">
                <div class="card-body text-center">
                    <h4 class="card-title">{{ dealer.name }}</h4>
                    
                    <p class="text-muted" *ngIf="dealer.cars">
                        {{ dealer.cars.length }} voitures en stock
                    </p>

                    <button class="btn btn-outline-primary">Visiter</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="container mt-4" *ngIf="dealerships.length === 0">
    <div class="alert alert-warning">Aucun concessionnaire trouvé dans la région.</div>
</div>
