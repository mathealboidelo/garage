<div class="container mt-5">
  <div class="form-page">

    <div class="form-page-title">Nouveau Pilote</div>
    <div class="form-page-subtitle">Enregistre ton identité de course</div>

    <div class="form-card card">
      <div class="card-body">
        <form (ngSubmit)="onSubmit()" #userForm="ngForm">
          <div class="form-group">
            <label for="name">Nom du pilote</label>
            <input
              type="text"
              [(ngModel)]="user.username"
              class="form-control"
              id="name" name="name"
              placeholder="Ex: Ryosuke_86"
              required #name="ngModel">
          </div>
          <div *ngIf="name.invalid && name.touched" class="alert alert-danger">
            Un nom de pilote est requis
          </div>
          <button
            type="submit"
            [disabled]="!userForm.form.valid"
            class="btn btn-success"
            style="width:100%;margin-top:.5rem">
            ▸ Créer le pilote
          </button>
        </form>
      </div>
    </div>

    <a routerLink="/" class="back-link">Retour au menu</a>

  </div>
</div>
