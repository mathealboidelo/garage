<div class="container mt-5">

  <div class="section-header">
    <h2>Concessionnaires</h2>
  </div>
  <p class="hud-label" style="margin-bottom:1.5rem;letter-spacing:.25em">
    Achète une voiture pour participer aux courses
  </p>

  <div *ngIf="dealerships.length === 0" class="alert alert-warning">
    Aucun concessionnaire disponible dans la région.
  </div>

  <div class="dealer-grid" *ngIf="dealerships.length > 0">
    <div
      class="dealer-card card"
      *ngFor="let dealer of dealerships"
      (click)="visitDealership(dealer.id)">
      <div class="card-body">
        <div class="dealer-name">{{ dealer.name }}</div>
        <div class="dealer-stock">
          <span>{{ dealer.cars.length || 0 }}</span> voiture(s) en stock
        </div>
        <button class="btn btn-outline-primary" style="font-size:.65rem">Visiter →</button>
      </div>
    </div>
  </div>

  <div class="nav-row">
    <button (click)="goToDashboard()" class="btn btn-outline-primary">← Tableau de bord</button>
  </div>

</div>
